name: CI/CD PIPELINE TO BUILD AND DEPLOYE TO TOMCAT
on:
  push:
    branches: main
jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: install java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: maven validate
        run: mvn validate
      - name: maven compile
        run: mvn compile
      - name: maven test
        run: mvn test
      - name: maven package
        run: mvn package
      - name: verify war file
        run: ls -lh target/
        # Deploy to Tomcat
      - name: deploy war to tomcat
        run: |
          curl -v -u ${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }} \
            -T target/TrainBook-1.0.0-SNAPSHOT.war \
            "http://${{ secrets.TOMCAT_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"
